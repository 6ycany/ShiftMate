name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK 35
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate mipmap launcher icons
        run: |
          SRC="app/src/main/res/drawable-nodpi/ic_launcher_source.png"
          declare -A SIZES=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )
          for dir in "${!SIZES[@]}"; do
            size=${SIZES[$dir]}
            dest="app/src/main/res/$dir"
            mkdir -p "$dest"
            convert "$SRC" -resize "${size}x${size}" "$dest/ic_launcher.png"
            convert "$SRC" -resize "${size}x${size}" "$dest/ic_launcher_round.png"
          done

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
